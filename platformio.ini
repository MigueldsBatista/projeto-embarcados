; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
build_dir = /home/miguel/.platformio/build/wilsom

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 9600

upload_port = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0

; Particao maior: 3 MB para o app (sem OTA), 1 MB SPIFFS
board_build.partitions = huge_app.csv

; Otimizacao de tamanho
build_flags =
  -Os
  -DCORE_DEBUG_LEVEL=0
  -D TRACKING_BENCHMARK_ENABLED=0
  -D RC522_SCK_PIN=18
  -D RC522_MOSI_PIN=23
  -D RC522_MISO_PIN=19
  -D RC522_SS_PIN=5
  -D RC522_RST_PIN=22

lib_deps =
  miguelbalboa/MFRC522@^1.4.12
  knolleary/PubSubClient@^2.8
  bblanchon/ArduinoJson@^6.21.3
  https://github.com/tzapu/WiFiManager.git

[env:esp32trackingbench]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 9600

upload_port = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0

board_build.partitions = huge_app.csv

build_flags =
  -Os
  -DCORE_DEBUG_LEVEL=0
  -D TRACKING_BENCHMARK_ENABLED=1
  -D TRACKING_BENCHMARK_WINDOW_SIZE=256
  -D TRACKING_BENCHMARK_RING_CAPACITY=512
  -D TRACKING_BENCHMARK_BATCH_SIZE=20
  -D TRACKING_BENCHMARK_NETWORK_DELAY_MS=1
  -D TRACKING_BENCHMARK_SNAPSHOT_LIMIT=24
  -D RC522_SCK_PIN=18
  -D RC522_MOSI_PIN=23
  -D RC522_MISO_PIN=19
  -D RC522_SS_PIN=5
  -D RC522_RST_PIN=22

lib_deps =
  miguelbalboa/MFRC522@^1.4.12
  knolleary/PubSubClient@^2.8
  bblanchon/ArduinoJson@^6.21.3
  https://github.com/tzapu/WiFiManager.git
